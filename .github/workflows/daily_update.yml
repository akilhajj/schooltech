name: Daily Lesson Update

on:
  schedule:
    - cron: '0 0 * * *' # ينطلق أوتوماتيكياً كل يوم تمام الساعة 12 منتصف الليل لتحديث الدروس
  workflow_dispatch: # يتيح لك الدخول للموقع وضغط زر "تشغيل يدوياً" لتحديث الحصص بأي وقت

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run AI Generator
      env:
        OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      run: python generate_lessons.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'AI-School-Bot'
        git config --global user.email 'bot@ai-school.com'
        git add .
        git commit -m "تحديث تلقائي لحصص اليوم السبعة" || exit 0
        git push
